<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>单词家族生成器 (终极防套娃修复版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        :root {
            --primary-color: #7d5a50;
            --bg-grid: #f4f8ff;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;

            color: #e0e0e0;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        .top-bar { width: 100%; max-width: 600px; display: flex; justify-content: flex-start; gap: 10px; margin-bottom: 12px; } .icon-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: white; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; backdrop-filter: blur(5px); transition: all 0.2s; display: flex; align-items: center; gap: 5px; } .icon-btn:hover { background: rgba(255, 255, 255, 0.2); border-color: rgba(255, 255, 255, 0.4); } .config-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);

            margin-bottom: 20px;
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }
        
        h3 { margin-top: 0; color: #fff; text-align: center; text-shadow: 0 0 10px rgba(255, 255, 255, 0.2); }
        .tips { font-size: 12px; color: #bbb; margin-bottom: 8px; display: block; text-align: center; }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            font-family: inherit;
        }
        
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button {
            flex: 1; padding: 14px; background: #4e73df; color: white;
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: background 0.3s;
        }
        button:hover { background: #375abd; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #downloadBtn { background: #28a745; display: none; }
        #downloadDataBtn { background: #ff9800; display: none; }

        .results-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px; width: 100%; max-width: 1200px;
        }
        @media (max-width: 768px) { .results-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } }

        .image-wrapper {

        }

        /* ------------------ 渲染区样式 ------------------ */
        #stagingArea { position: absolute; top: -9999px; left: -9999px; opacity: 0; pointer-events: none; }
        
        .theme-modern { --card-bg: #f4f8ff; --text-color: #333; --border-color: #b0c4de; --accent: #4e73df; --bg-img: linear-gradient(#e0eaff 1px, transparent 1px), linear-gradient(90deg, #e0eaff 1px, transparent 1px); }
        .theme-academia { --card-bg: #1a1e26; --text-color: #d4af37; --border-color: #3e4451; --accent: #d4af37; --bg-img: radial-gradient(circle at 2px 2px, rgba(212,175,55,0.05) 1px, transparent 0); }
        .theme-botanical { --card-bg: #fcfdfa; --text-color: #2d5a27; --border-color: #e2e8e0; --accent: #2e7d32; --bg-img: linear-gradient(135deg, #f5f7f2 25%, transparent 25%), linear-gradient(225deg, #f5f7f2 25%, transparent 25%); }
        .theme-zen { --card-bg: #f9f7f2; --text-color: #4a4a4a; --border-color: #dcd7c9; --accent: #8b8378; --bg-img: none; }
        .theme-nordic { --card-bg: #eceff4; --text-color: #2e3440; --border-color: #d8dee9; --accent: #5e81ac; --bg-img: linear-gradient(transparent 19px, #d8dee9 20px); }
        .theme-royal { --card-bg: #2d0a31; --text-color: #e0b0ff; --border-color: #4a154b; --accent: #ff00ff; --bg-img: repeating-linear-gradient(45deg, rgba(74,21,75,0.1) 0px, rgba(74,21,75,0.1) 2px, transparent 2px, transparent 10px); }
        .theme-coffee { --card-bg: #f3ece0; --text-color: #5d4037; --border-color: #d7ccc8; --accent: #8d6e63; --bg-img: radial-gradient(#d7ccc8 1px, transparent 0); }
        .theme-swiss { --card-bg: #ffffff; --text-color: #1d3557; --border-color: #e63946; --accent: #e63946; --bg-img: linear-gradient(90deg, #f1faee 1px, transparent 1px); }
        .theme-dream { --card-bg: #ffffff; --text-color: #4a148c; --border-color: #ce93d8; --accent: #9c27b0; --bg-img: linear-gradient(180deg, #f3e5f5 0%, #ffffff 100%); }
        .theme-industrial { --card-bg: #2b2b2b; --text-color: #ffffff; --border-color: #444; --accent: #ffb400; --bg-img: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); }

        .card-container {

            border: 1px solid rgba(176, 196, 222, 0.5); flex-shrink: 0;
            display: flex; flex-wrap: wrap; gap: 10px; align-content: flex-start;

        .def-item {
            font-size: 14px; line-height: 1.4; background: rgba(240, 244, 255, 0.6);
            padding: 4px 8px; border-radius: 6px; display: inline-flex; align-items: center;
        }

        .en-paragraph mark.hl {
            display: inline-block;

        mark.hl { border-radius: 4px; padding: 2px 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); color: #111; }
        /* 预览相册样式 */
        .lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;

        }
        .lightbox-counter { position: absolute; top: 20px; left: 20px; color: white; font-size: 16px; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; z-index: 2100; }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="icon-btn" onclick="toggleFullScreen()">⛶ 全屏切换</button>
    <!-- 此处可预留更多功能按钮 -->
</div>

<div class="config-panel">
    <h3>📖单词家族批注卡片 (终极防套娃修复版)</h3>
    <input type="password" id="apiKey" placeholder="输入您的 Gemini API Key" oninput="saveApiKey()">
    <span class="tips">采用单次扫描匹配算法，彻底杜绝 HTML 代码错乱Bug！</span>
    <select id="modelSelect" style="width:100%; padding:10px; margin-bottom:10px; background:rgba(0,0,0,0.2); color:white; border-radius:8px; border:1px solid rgba(255,255,255,0.2);">
        <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash Lite</option>
        <option value="gemini-3-flash-preview">Gemini 3 Flash Preview</option>
        <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite</option>
    </select>
    <select id="themeSelect" onchange="updateAllCardsTheme()" style="width:100%; padding:10px; margin-bottom:10px; background:rgba(0,0,0,0.2); color:white; border-radius:8px; border:1px solid rgba(255,255,255,0.2);">
        <option value="modern">✨ 现代简约 (Modern)</option>
        <option value="academia">📜 深夜学院 (Academia)</option>
        <option value="botanical">🌿 植物图鉴 (Botanical)</option>
        <option value="zen">🍵 枯山淡墨 (Zen)</option>
        <option value="nordic">❄️ 北欧极简 (Nordic)</option>
        <option value="royal">👑 宫廷典雅 (Royal)</option>
        <option value="coffee">☕ 咖啡手账 (Coffee)</option>
        <option value="swiss">📐 包豪斯红 (Swiss)</option>
        <option value="dream">🦄 幻梦云端 (Dream)</option>
        <option value="industrial">🏗️ 工业废墟 (Industrial)</option>
    </select>
    <textarea id="topicInput" placeholder="例如: 污染物; 森林; 繁荣"></textarea>
    
    <div class="btn-group">
        <button id="generateBtn" onclick="startBatchGeneration()">生成精美卡片</button>
        <button id="abortBtn" onclick="abortGeneration()" style="background: #dc3545; display: none;">强制停止生成</button>
        <button id="downloadBtn" onclick="downloadAllImages()">打包下载所有图片</button>
        <button id="downloadDataBtn" onclick="downloadAllData()">下载轻量数据(JSONL)</button>
    </div>
</div>

<div id="resultsGrid" class="results-grid"></div>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close">&times;</span>

    <img id="lightboxImg" class="lightbox-img" src="" onclick="event.stopPropagation()">
    <div id="lightboxCounter" class="lightbox-counter"></div>
</div>
<div id="stagingArea"></div>

<script>
function toggleFullScreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
            console.error(`无法开启全屏: ${err.message}`);
        });
    } else {
        if (document.exitFullscreen) document.exitFullscreen();
    }
}

let generatedImagesData = [];
let rawResultsData = [];
let currentGalleryIndex = 0;
let touchStartX = 0;
let isAborted = false;

const HighlighterColors = [
    '#a1f2c2', '#d4b8ff', '#fcf3a2', '#ffb3ba', '#bae1ff', 
    '#ffdfba', '#fcc8e8', '#e2f0cb', '#dec3c3', '#cbaacb'
];

window.addEventListener('DOMContentLoaded', () => {
    const savedKey = localStorage.getItem('gemini_key');
    if (savedKey) document.getElementById('apiKey').value = savedKey;
});

function saveApiKey() {
    const key = document.getElementById('apiKey').value.trim();
    localStorage.setItem('gemini_key', key);
}

async function startBatchGeneration() {
    const key = document.getElementById('apiKey').value.trim();
    isAborted = false;
    document.getElementById('abortBtn').style.display = 'block';
    const rawTopic = document.getElementById('topicInput').value;
    const generateBtn = document.getElementById('generateBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const resultsGrid = document.getElementById('resultsGrid');
    const stagingArea = document.getElementById('stagingArea');

    if(!key) return alert("请先填写 API Key！");
    
    const topics = rawTopic.split(/;|；|\n/).map(t => t.trim()).filter(t => t);
    if(topics.length === 0) return alert("请输入至少一个关键词！");

    generateBtn.disabled = true;
    generateBtn.innerText = 'AI与排版引擎正在运算...';
    downloadBtn.style.display = 'none';
    document.getElementById('downloadDataBtn').style.display = 'none';
    resultsGrid.innerHTML = ''; 
    stagingArea.innerHTML = '';
    generatedImagesData = new Array(topics.length).fill(null);

    topics.forEach((topic, index) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'image-wrapper';
        wrapper.id = `wrapper-${index}`;
        wrapper.innerHTML = `<div class="status-text">正在构思<br><b>${topic}</b><br>自适应排版中...</div>`;
        resultsGrid.appendChild(wrapper);
    });

    const promises = topics.map((topic, index) => processSingleTopic(topic, index, key));
    await Promise.allSettled(promises);

    generateBtn.disabled = false;
    generateBtn.innerText = '生成精美卡片';
    document.getElementById('abortBtn').style.display = 'none';
    if (generatedImagesData.some(item => item !== null)) {
        downloadBtn.style.display = 'block';
        document.getElementById('downloadDataBtn').style.display = 'block';
    }
}

function abortGeneration() {
    if(confirm("确定要强制停止生成吗？已完成的卡片将保留。")) {
        isAborted = true;
        document.getElementById('generateBtn').disabled = false;
        document.getElementById('generateBtn').innerText = '生成精美卡片';
        document.getElementById('abortBtn').style.display = 'none';
        if (generatedImagesData.some(item => item !== null)) {
            document.getElementById('downloadBtn').style.display = 'block';
            document.getElementById('downloadDataBtn').style.display = 'block';
        }
    }
}

async function processSingleTopic(topic, index, key) {
    const wrapper = document.getElementById(`wrapper-${index}`);
    const stagingArea = document.getElementById('stagingArea');
    let retryCount = 0;

    while (!isAborted) {
        try {
        const prompt = `你是一个英语词汇专家。请围绕中文词汇"${topic}"，生成一套单词家族数据。
要求：
1. 提供10个精准的相关英文词（涵盖不同词性）。
2. 每个单词的中文解释必须【极简】，控制在 4-8 个字以内。
3. 创作一段连贯的英文段落（40-60词），巧妙包含这10个单词。
4. 为每个单词提供国际音标（IPA）。
5. 【极其重要的排版指令】：不要在英文段落中使用任何方括号！返回一段没有特殊格式的纯文本段落。
6. 提供准确的中文翻译。

严格按照以下JSON格式返回：
{
  "theme": "${topic}",
  "pos": "n/v/adj",
  "words": [
    {"word": "word1", "phonetic": "/ipa1/", "definition": "解释1"},
    {"word": "word2", "phonetic": "/ipa2/", "definition": "解释2"}
  ],
  "paragraph_en": "英文段落...",
  "paragraph_zh": "中文翻译..."
}`;

        const model = document.getElementById('modelSelect').value;
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        
        if (isAborted) return;
        if (!response.ok) throw new Error(`HTTP Error ${response.status}`);
        const data = await response.json();
        if (data.error) throw new Error(data.error.message);

        const rawText = data.candidates[0].content.parts[0].text;
        const jsonMatch = rawText.match(/\{[\s\S]*\}/);
        if(!jsonMatch) throw new Error("无法解析 JSON");
        if (isAborted) return;
        const cleanJson = JSON.parse(jsonMatch[0]);

        const cardDOM = createBaseCardDOM(cleanJson);
        stagingArea.appendChild(cardDOM);

        await applyAutoFitLogic(cardDOM);
        drawDynamicTree(cardDOM, cleanJson);

        await new Promise(resolve => setTimeout(resolve, 150)); 
        const canvas = await html2canvas(cardDOM, { scale: 2, backgroundColor: null });
        const dataUrl = canvas.toDataURL('image/png');

        generatedImagesData[index] = { theme: cleanJson.theme, dataUrl: dataUrl };
        rawResultsData[index] = cleanJson;
        wrapper.innerHTML = `<img src="${dataUrl}" class="result-img" alt="${cleanJson.theme}">`;
        wrapper.onclick = () => openLightbox(index);
        cardDOM.remove();

            return; // 成功生成后退出循环
        } catch (e) {
            if (isAborted) return;
            retryCount++;
            console.error(`"${topic}" 第 ${retryCount} 次尝试失败:`, e);
            wrapper.innerHTML = `<div class="status-text error-text">"${topic}"<br>生成异常，重试中(${retryCount})</div>`;
            await new Promise(resolve => setTimeout(resolve, 2000)); // 等待2秒后重试，避免频率限制
        }
    }
}

function createBaseCardDOM(data) {
    const card = document.createElement('div');
    const theme = document.getElementById('themeSelect').value;
    card.className = `card-container theme-${theme}`;

    const topSec = document.createElement('div');
    topSec.className = 'top-section';

    // [核心大修]：单次扫描正则替换引擎
    // 1. 保留原始索引并按长度降序排序（防止"train"优先匹配导致"training"被截断）
    const sortedWords = data.words.map((w, index) => ({...w, originalIndex: index}))
                                  .sort((a, b) => b.word.length - a.word.length);
    
    // 2. 将10个单词拼接成一个巨大的正在表达式: \b(word1|word2|word3)\b
    const escapedWords = sortedWords.map(w => w.word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
    const combinedRegex = new RegExp(`\\b(${escapedWords.join('|')})\\b`, 'gi');

    // 3. 一次性走完整个段落进行替换。匹配到谁就换谁，绝对不会回头去匹配已经生成的 <mark> 标签内部！
    const currentHighlightedEn = data.paragraph_en.replace(combinedRegex, (match) => {
        const lowerMatch = match.toLowerCase();
        // 找到具体是哪个单词被匹配到了，以便取对应颜色
        const foundWord = sortedWords.find(w => lowerMatch === w.word.toLowerCase());
        if (foundWord) {
            const color = HighlighterColors[foundWord.originalIndex % HighlighterColors.length];
            return `<mark class="hl" style="background-color: ${color};">${match}</mark>`;
        }
        return match;
    });

    topSec.innerHTML = `
        <div class="en-paragraph">${currentHighlightedEn}</div>
        <div class="zh-translation">翻译：${data.paragraph_zh}</div>
    `;
    card.appendChild(topSec);

    const midSec = document.createElement('div');
    midSec.className = 'middle-tree';
    card.appendChild(midSec);

    const botSec = document.createElement('div');
    botSec.className = 'bottom-section';
    let defHTML = '';
    data.words.forEach((item, i) => {
        const color = HighlighterColors[i % HighlighterColors.length];
        defHTML += `<div class="def-item" style="flex-direction: column; align-items: flex-start;">
            <div style="margin-bottom: 2px;"><mark class="hl" style="background-color: ${color}; font-weight: 600; margin-right: 6px;">${item.word}</mark><span style="font-size: 12px; color: #888;">${item.phonetic || ''}</span></div>
            <div style="color: #444;">${item.definition}</div>
        </div>`;
    });
    botSec.innerHTML = defHTML;
    card.appendChild(botSec);

    return card;
}

async function applyAutoFitLogic(cardDOM) {
    // 提高初始字号以填充上方空间，缩小中下间距
    let fontEn = 25; 
    let fontZh = 20;
    let fontDef = 16;
    let lhEn = 2.2; 

    const enPara = cardDOM.querySelector('.en-paragraph');
    const zhPara = cardDOM.querySelector('.zh-translation');
    const botSec = cardDOM.querySelector('.bottom-section');

    // [注释：卡片上中下的上部分中英文段翻译]
    // 初始应用较大字号
    enPara.style.fontSize = `${fontEn}px`;
    enPara.style.lineHeight = `${lhEn}`;
    zhPara.style.fontSize = `${fontZh}px`;
    botSec.querySelectorAll('.def-item').forEach(el => el.style.fontSize = `${fontDef}px`);

    // 动态检测：如果总高度超过卡片高度，则逐步缩小字号
    while (cardDOM.scrollHeight > 1070 && fontEn > 14) {
        fontEn -= 0.4;
        fontZh -= 0.3;
        fontDef -= 0.2;
        
        if (lhEn > 1.6) lhEn -= 0.03;

        enPara.style.fontSize = `${fontEn}px`;
        enPara.style.lineHeight = `${lhEn}`;
        zhPara.style.fontSize = `${fontZh}px`;
        
        const defItems = botSec.querySelectorAll('.def-item');
        defItems.forEach(el => {
            el.style.fontSize = `${Math.max(12, fontDef)}px`;
        });
    }
}

function drawDynamicTree(cardDOM, data) {
    const midSec = cardDOM.querySelector('.middle-tree');
    const midWidth = midSec.offsetWidth;
    const midHeight = midSec.offsetHeight;
    
    const centerX = midWidth / 2;
    const centerY = midHeight / 2;
    const radius = Math.min(midWidth, midHeight) / 2 - 45;

    const center = document.createElement('div');
    center.className = 'center-word';
    center.innerText = `${data.pos || ''}. ${data.theme}`;
    center.style.left = `${centerX}px`;
    center.style.top = `${centerY}px`;
    center.style.transform = `translate(-50%, -50%)`;
    midSec.appendChild(center);

    data.words.forEach((item, i) => {
        const color = HighlighterColors[i % HighlighterColors.length];
        const angleDeg = (i * (360 / data.words.length)) - 90;
        const angleRad = angleDeg * (Math.PI / 180);
        
        const x = centerX + Math.cos(angleRad) * radius;
        const y = centerY + Math.sin(angleRad) * radius;

        const el = document.createElement('div');
        el.className = 'word-item';
        el.style.backgroundColor = color; 
        el.innerText = item.word;
        
        const cos = Math.cos(angleRad);
        const sin = Math.sin(angleRad);
        
        let tx = -50;
        if (cos > 0.3) tx = 0; else if (cos < -0.3) tx = -100;
        let ty = -50;
        if (sin > 0.7) ty = 0; else if (sin < -0.7) ty = -100;

        el.style.left = `${x}px`;
        el.style.top = `${y}px`;
        el.style.transform = `translate(${tx}%, ${ty}%)`;
        midSec.appendChild(el);

        const line = document.createElement('div');
        line.className = 'line';
        line.style.backgroundColor = color; 
        line.style.left = `${centerX}px`;
        line.style.top = `${centerY}px`;
        const lineLength = radius - 35;
        line.style.width = `${lineLength}px`;
        line.style.transform = `rotate(${angleDeg}deg) translate(35px, 0)`; 
        midSec.appendChild(line);
    });
}

async function updateAllCardsTheme() {
    const stagingArea = document.getElementById('stagingArea');
    const resultsGrid = document.getElementById('resultsGrid');
    const theme = document.getElementById('themeSelect').value;

    for (let i = 0; i < rawResultsData.length; i++) {
        if (!rawResultsData[i]) continue;
        const wrapper = document.getElementById(`wrapper-${i}`);
        const cardDOM = createBaseCardDOM(rawResultsData[i]);
        stagingArea.appendChild(cardDOM);
        await applyAutoFitLogic(cardDOM);
        drawDynamicTree(cardDOM, rawResultsData[i]);
        const canvas = await html2canvas(cardDOM, { scale: 2, backgroundColor: null });
        const dataUrl = canvas.toDataURL('image/png');
        generatedImagesData[i].dataUrl = dataUrl;
        wrapper.innerHTML = `<img src="${dataUrl}" class="result-img" alt="${rawResultsData[i].theme}">`;
        wrapper.onclick = () => openLightbox(i);
        cardDOM.remove();
    }
}

// --- 相册功能函数 ---
function openLightbox(index) {
    const validData = generatedImagesData.filter(img => img !== null);
    if (validData.length === 0) return;
    
    currentGalleryIndex = index;
    updateLightboxContent();
    document.getElementById('lightbox').style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function updateLightboxContent() {
    const imgData = generatedImagesData[currentGalleryIndex];
    if (!imgData) return;
    
    const imgEl = document.getElementById('lightboxImg');
    imgEl.src = imgData.dataUrl;
    document.getElementById('lightboxCounter').innerText = `${currentGalleryIndex + 1} / ${generatedImagesData.length}`;
}

function closeLightbox() {
    document.getElementById('lightbox').style.display = 'none';
    document.body.style.overflow = 'auto';
}

function nextImage(e) {
    if (e) e.stopPropagation();
    currentGalleryIndex = (currentGalleryIndex + 1) % generatedImagesData.length;
    updateLightboxContent();
}

function prevImage(e) {
    if (e) e.stopPropagation();
    currentGalleryIndex = (currentGalleryIndex - 1 + generatedImagesData.length) % generatedImagesData.length;
    updateLightboxContent();
}

// 键盘与滑动监听
window.addEventListener('keydown', (e) => {
    if (document.getElementById('lightbox').style.display === 'flex') {
        if (e.key === 'ArrowRight') nextImage();
        if (e.key === 'ArrowLeft') prevImage();
        if (e.key === 'Escape') closeLightbox();
    }
});

const lb = document.getElementById('lightbox');
lb.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, false);
lb.addEventListener('touchend', e => {
    let touchEndX = e.changedTouches[0].screenX;
    if (touchStartX - touchEndX > 50) nextImage();
    if (touchEndX - touchStartX > 50) prevImage();
}, false);

function downloadAllData() {
    const validData = rawResultsData.filter(item => item !== null);
    if(validData.length === 0) return;

    const uiTheme = document.getElementById('themeSelect').value;
    
    let jsonlContent = "";
    validData.forEach(data => {
        const compressed = {
            t: data.theme,
            pos: data.pos,
            ui: uiTheme,
            w: data.words.map(w => ({
                n: w.word,
                p: w.phonetic,
                d: w.definition
            })),
            en: data.paragraph_en,
            zh: data.paragraph_zh
        };
        jsonlContent += JSON.stringify(compressed) + "\n";
    });

    const blob = new Blob([jsonlContent], { type: "text/plain;charset=utf-8" });
    saveAs(blob, "单词卡片纯文本数据.jsonl");
}

async function downloadAllImages() {
    const validImages = generatedImagesData.filter(item => item !== null);
    if(validImages.length === 0) return;

    if(validImages.length === 1) {
        const link = document.createElement('a');
        link.download = `批注单词卡-${validImages[0].theme}.png`;
        link.href = validImages[0].dataUrl;
        link.click();
    } else {
        const zip = new JSZip();
        validImages.forEach(img => {
            const base64Data = img.dataUrl.replace(/^data:image\/(png|jpg);base64,/, "");
            zip.file(`批注单词卡-${img.theme}.png`, base64Data, {base64: true});
        });
        try {
            const content = await zip.generateAsync({type:"blob"});
            saveAs(content, "批注单词卡批量下载.zip");
        } catch(e) {
            console.error("ZIP打包失败", e);
            alert("文件打包失败，请检查浏览器权限。");
        }
    }
}
