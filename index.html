<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单词家族生成器 (自适应排版版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root {
            --primary-color: #7d5a50;
            --bg-grid: #f4f8ff;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #2b324c 0%, #16213e 50%, #2b324c 100%);
            color: #e0e0e0;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        .config-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }
        
        h3 { margin-top: 0; color: #fff; text-align: center; text-shadow: 0 0 10px rgba(255, 255, 255, 0.2); }
        .tips { font-size: 12px; color: #bbb; margin-bottom: 8px; display: block; text-align: center; }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            font-family: inherit;
        }
        
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button {
            flex: 1; padding: 14px; background: #4e73df; color: white;
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: background 0.3s;
        }
        button:hover { background: #375abd; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #downloadBtn { background: #28a745; display: none; }

        .results-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px; width: 100%; max-width: 1200px;
        }
        @media (max-width: 768px) { .results-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } }

        .image-wrapper {
            background: white; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            aspect-ratio: 9 / 19.5; position: relative;
        }
        .result-img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .status-text { font-size: 14px; color: #666; text-align: center; padding: 10px; }
        .error-text { color: #dc3545; font-weight: bold; }

        /* ------------------ 渲染区样式 ------------------ */
        #stagingArea { position: absolute; top: -9999px; left: -9999px; opacity: 0; pointer-events: none; }

        .card-container {
            width: 500px; 
            height: 1083px; /* 严格固定高度，用于触发溢出检测 */
            background-color: var(--bg-grid);
            background-image: linear-gradient(#e0eaff 1px, transparent 1px), linear-gradient(90deg, #e0eaff 1px, transparent 1px);
            background-size: 20px 20px;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            display: flex; flex-direction: column;
            padding: 30px; color: #333;
            overflow: hidden; /* 保证外部不乱，内部做计算 */
        }

        .header-box {
            background: white; border: 2px solid #b0c4de;
            width: 80%; margin: 0 auto 20px auto; text-align: center;
            padding: 12px; font-size: 24px; font-weight: bold;
            color: var(--primary-color); border-radius: 4px;
            box-shadow: 2px 2px 0px #b0c4de; flex-shrink: 0;
        }

        .top-section {
            background: rgba(255, 255, 255, 0.7); padding: 15px 20px;
            border-radius: 12px; margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); border: 1px solid rgba(176, 196, 222, 0.3);
            flex-shrink: 0;
        }
        /* 初始字号设定，会被JS动态覆盖 */
        .en-paragraph { font-weight: 500; font-size: 17px; line-height: 1.7; margin-bottom: 10px; transition: all 0.2s;}
        .zh-translation { font-size: 15px; color: #555; border-top: 1px dashed #ccc; padding-top: 10px; line-height: 1.5;}
        
        .middle-tree {
            flex-grow: 1; position: relative;
            min-height: 320px; /* 强制树状图区域至少保留这么多高度，防止被文字完全挤压 */
            width: 100%; margin-bottom: 20px;
        }
        
        .center-word {
            position: absolute; font-size: 20px; font-weight: bold;
            background: white; padding: 8px 16px; border: 1px solid #b0c4de;
            border-radius: 6px; z-index: 100; white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            /* 会通过JS居中定位 */
        }

        .word-item {
            position: absolute; font-size: 16px; color: #333; z-index: 110;
            background: white; padding: 4px 8px; border-radius: 4px;
            font-weight: 600; white-space: nowrap;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #eee;
        }
        .line { position: absolute; height: 2px; transform-origin: left center; z-index: 5; }

        /* 底部流式标签布局，极大节省空间且防爆框 */
        .bottom-section {
            background: rgba(255, 255, 255, 0.85); padding: 15px 20px;
            border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 1px solid rgba(176, 196, 222, 0.5); flex-shrink: 0;
            display: flex; flex-wrap: wrap; gap: 8px 12px; align-content: flex-start;
        }
        
        .def-item {
            font-size: 14px; line-height: 1.4; background: rgba(240, 244, 255, 0.6);
            padding: 4px 8px; border-radius: 6px; display: inline-flex; align-items: center;
        }

        mark.hl { border-radius: 4px; padding: 2px 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); color: #111; }
    </style>
</head>
<body>

<div class="config-panel">
    <h3>📖单词家族批注卡片 (智能自适应版)</h3>
    <input type="password" id="apiKey" placeholder="输入您的 Gemini API Key" oninput="saveApiKey()">
    <span class="tips">已加入动态排版引擎，长短内容自动缩放防爆框！</span>
    <textarea id="topicInput" placeholder="例如: 污染物; 森林; 繁荣"></textarea>
    
    <div class="btn-group">
        <button id="generateBtn" onclick="startBatchGeneration()">生成精美卡片</button>
        <button id="downloadBtn" onclick="downloadAllImages()">打包下载所有图片</button>
    </div>
</div>

<div id="resultsGrid" class="results-grid"></div>
<div id="stagingArea"></div>

<script>
let generatedImagesData = [];

// 10 种经典的荧光笔配色
const HighlighterColors = [
    '#a1f2c2', '#d4b8ff', '#fcf3a2', '#ffb3ba', '#bae1ff', 
    '#ffdfba', '#fcc8e8', '#e2f0cb', '#dec3c3', '#cbaacb'
];

window.addEventListener('DOMContentLoaded', () => {
    const savedKey = localStorage.getItem('gemini_key');
    if (savedKey) document.getElementById('apiKey').value = savedKey;
});

function saveApiKey() {
    const key = document.getElementById('apiKey').value.trim();
    localStorage.setItem('gemini_key', key);
}

async function startBatchGeneration() {
    const key = document.getElementById('apiKey').value.trim();
    const rawTopic = document.getElementById('topicInput').value;
    const generateBtn = document.getElementById('generateBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const resultsGrid = document.getElementById('resultsGrid');
    const stagingArea = document.getElementById('stagingArea');

    if(!key) return alert("请先填写 API Key！");
    
    const topics = rawTopic.split(/;|；|\n/).map(t => t.trim()).filter(t => t);
    if(topics.length === 0) return alert("请输入至少一个关键词！");

    generateBtn.disabled = true;
    generateBtn.innerText = 'AI与排版引擎正在运算...';
    downloadBtn.style.display = 'none';
    resultsGrid.innerHTML = ''; 
    stagingArea.innerHTML = '';
    generatedImagesData = new Array(topics.length).fill(null);

    topics.forEach((topic, index) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'image-wrapper';
        wrapper.id = `wrapper-${index}`;
        wrapper.innerHTML = `<div class="status-text">正在构思<br><b>${topic}</b><br>自适应排版中...</div>`;
        resultsGrid.appendChild(wrapper);
    });

    const promises = topics.map((topic, index) => processSingleTopic(topic, index, key));
    await Promise.allSettled(promises);

    generateBtn.disabled = false;
    generateBtn.innerText = '生成精美卡片';
    if (generatedImagesData.some(item => item !== null)) {
        downloadBtn.style.display = 'block';
    }
}

async function processSingleTopic(topic, index, key) {
    const wrapper = document.getElementById(`wrapper-${index}`);
    const stagingArea = document.getElementById('stagingArea');

    try {
        // Prompt 中进一步限制字数，配合自适应引擎
        const prompt = `你是一个英语词汇专家。请围绕中文词汇"${topic}"，生成一套单词家族数据。
要求：
1. 提供10个精准的相关英文词（涵盖不同词性）。
2. 每个单词的中文解释必须【极简】，控制在 4-8 个字以内。
3. 创作一段连贯的英文段落（40-60词），巧妙包含这10个单词。
4. 必须用方括号将段落中的这10个相关词汇括起来！例如：The [primeval] [timberland] was once...
5. 提供准确的中文翻译。

严格按照以下JSON格式返回：
{
  "theme": "${topic}",
  "pos": "n/v/adj",
  "words": [
    {"word": "word1", "definition": "解释1"},
    {"word": "word2", "definition": "解释2"}
  ],
  "paragraph_en": "英文段落...",
  "paragraph_zh": "中文翻译..."
}`;

        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${key}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        
        if (!response.ok) throw new Error(`HTTP Error ${response.status}`);
        const data = await response.json();
        if (data.error) throw new Error(data.error.message);

        const rawText = data.candidates[0].content.parts[0].text;
        const jsonMatch = rawText.match(/\{[\s\S]*\}/);
        if(!jsonMatch) throw new Error("无法解析 JSON");
        const cleanJson = JSON.parse(jsonMatch[0]);

        // 1. 构建基础 DOM，不包含树状图的具体坐标
        const cardDOM = createBaseCardDOM(cleanJson);
        stagingArea.appendChild(cardDOM);

        // 2. 核心自适应排版引擎 (Auto-Fit)
        await applyAutoFitLogic(cardDOM);

        // 3. 在排版稳定后，动态测算可用空间并绘制思维导图
        drawDynamicTree(cardDOM, cleanJson);

        await new Promise(resolve => setTimeout(resolve, 150)); 
        const canvas = await html2canvas(cardDOM, { scale: 2, backgroundColor: null });
        const dataUrl = canvas.toDataURL('image/png');

        generatedImagesData[index] = { theme: cleanJson.theme, dataUrl: dataUrl };
        wrapper.innerHTML = `<img src="${dataUrl}" class="result-img" alt="${cleanJson.theme}">`;
        cardDOM.remove();

    } catch (e) {
        console.error(`"${topic}" 生成失败:`, e);
        wrapper.innerHTML = `<div class="status-text error-text">"${topic}"<br>生成失败，请重试</div>`;
    }
}

// 构建基础外壳（未画线）
function createBaseCardDOM(data) {
    const card = document.createElement('div');
    card.className = 'card-container';

    // 顶部标题
    const header = document.createElement('div');
    header.className = 'header-box';
    header.innerText = `单词家族 “${data.theme}”`;
    card.appendChild(header);

    // 顶部段落区
    const topSec = document.createElement('div');
    topSec.className = 'top-section';
    let highlightedEn = data.paragraph_en.replace(/\[(.*?)\]/g, (match, wordInside) => {
        let matchedColor = '#e2e2e2'; 
        for(let i=0; i<data.words.length; i++) {
            const root = data.words[i].word.toLowerCase();
            const current = wordInside.toLowerCase();
            if (current.includes(root) || root.includes(current)) {
                matchedColor = HighlighterColors[i % HighlighterColors.length];
                break;
            }
        }
        return `<mark class="hl" style="background-color: ${matchedColor};">${wordInside}</mark>`;
    });
    topSec.innerHTML = `
        <div class="en-paragraph">${highlightedEn}</div>
        <div class="zh-translation">翻译：${data.paragraph_zh}</div>
    `;
    card.appendChild(topSec);

    // 中部思维导图容器（留空，等排版完毕后再画）
    const midSec = document.createElement('div');
    midSec.className = 'middle-tree';
    card.appendChild(midSec);

    // 底部词典区（采用流式标签布局）
    const botSec = document.createElement('div');
    botSec.className = 'bottom-section';
    let defHTML = '';
    data.words.forEach((item, i) => {
        const color = HighlighterColors[i % HighlighterColors.length];
        defHTML += `<div class="def-item">
            <mark class="hl" style="background-color: ${color}; font-weight: 600; margin-right: 6px;">${item.word}</mark> ${item.definition}
        </div>`;
    });
    botSec.innerHTML = defHTML;
    card.appendChild(botSec);

    return card;
}

// 动态字号缩放循环
async function applyAutoFitLogic(cardDOM) {
    let fontEn = 17;
    let fontZh = 15;
    let fontDef = 14;
    let lhEn = 1.7;

    const enPara = cardDOM.querySelector('.en-paragraph');
    const zhPara = cardDOM.querySelector('.zh-translation');
    const botSec = cardDOM.querySelector('.bottom-section');

    // 只要实际内容高度超过了预设的 1083px 卡片高度，且字号没小到极限，就循环缩小
    while (cardDOM.scrollHeight > 1083 && fontEn > 12) {
        fontEn -= 0.5;
        fontZh -= 0.5;
        fontDef -= 0.5;
        lhEn -= 0.05;

        enPara.style.fontSize = `${fontEn}px`;
        enPara.style.lineHeight = `${lhEn}`;
        zhPara.style.fontSize = `${fontZh}px`;
        
        // 更新词典区内所有标签的字号
        const defItems = botSec.querySelectorAll('.def-item');
        defItems.forEach(el => el.style.fontSize = `${fontDef}px`);
    }
}

// 根据实际计算出的剩余空间绘制树状图
function drawDynamicTree(cardDOM, data) {
    const midSec = cardDOM.querySelector('.middle-tree');
    
    // 获取排版后 middle-tree 实际分配到的宽高
    const midWidth = midSec.offsetWidth;
    const midHeight = midSec.offsetHeight;
    
    // 动态中心点
    const centerX = midWidth / 2;
    const centerY = midHeight / 2;
    
    // 动态半径：取宽高较小值的一半，再减去边缘留白，保证绝对不会画出界
    const radius = Math.min(midWidth, midHeight) / 2 - 45;

    // 绘制中心词
    const center = document.createElement('div');
    center.className = 'center-word';
    center.innerText = `${data.pos || ''}. ${data.theme}`;
    // 绝对居中定位
    center.style.left = `${centerX}px`;
    center.style.top = `${centerY}px`;
    center.style.transform = `translate(-50%, -50%)`;
    midSec.appendChild(center);

    // 绘制四周单词与连线
    data.words.forEach((item, i) => {
        const color = HighlighterColors[i % HighlighterColors.length];
        const angleDeg = (i * (360 / data.words.length)) - 90;
        const angleRad = angleDeg * (Math.PI / 180);
        
        const x = centerX + Math.cos(angleRad) * radius;
        const y = centerY + Math.sin(angleRad) * radius;

        const el = document.createElement('div');
        el.className = 'word-item';
        el.style.backgroundColor = color; 
        el.innerText = item.word;
        
        const cos = Math.cos(angleRad);
        const sin = Math.sin(angleRad);
        
        // 象限偏移对齐计算
        let tx = -50;
        if (cos > 0.3) tx = 0; else if (cos < -0.3) tx = -100;
        let ty = -50;
        if (sin > 0.7) ty = 0; else if (sin < -0.7) ty = -100;

        el.style.left = `${x}px`;
        el.style.top = `${y}px`;
        el.style.transform = `translate(${tx}%, ${ty}%)`;
        midSec.appendChild(el);

        const line = document.createElement('div');
        line.className = 'line';
        line.style.backgroundColor = color; 
        line.style.left = `${centerX}px`;
        line.style.top = `${centerY}px`;
        // 连线长度根据动态半径减去中心词大概占用的空间
        const lineLength = radius - 35;
        line.style.width = `${lineLength}px`;
        line.style.transform = `rotate(${angleDeg}deg) translate(35px, 0)`; 
        midSec.appendChild(line);
    });
}

async function downloadAllImages() {
    const validImages = generatedImagesData.filter(item => item !== null);
    if(validImages.length === 0) return;

    if(validImages.length === 1) {
        const link = document.createElement('a');
        link.download = `批注单词卡-${validImages[0].theme}.png`;
        link.href = validImages[0].dataUrl;
        link.click();
    } else {
        const zip = new JSZip();
        validImages.forEach(img => {
            const base64Data = img.dataUrl.replace(/^data:image\/(png|jpg);base64,/, "");
            zip.file(`批注单词卡-${img.theme}.png`, base64Data, {base64: true});
        });
        try {
            const content = await zip.generateAsync({type:"blob"});
            saveAs(content, "批注单词卡批量下载.zip");
        } catch(e) {
            console.error("ZIP打包失败", e);
            alert("文件打包失败，请检查浏览器权限。");
        }
    }
}
</script>
</body>
</html>
